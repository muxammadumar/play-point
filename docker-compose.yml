services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: playpoint
      POSTGRES_PASSWORD: playpoint
      POSTGRES_DB: playpoint
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
