<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Seat Selection - Play Point</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00eeff",
                        "secondary-pink": "#ff007f",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0a0c0c",
                        "glass-dark": "rgba(15, 34, 35, 0.8)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow-primary {
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.4);
        }
        .neon-glow-pink {
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.5);
        }
        .grid-bg {
            background-image: radial-gradient(circle, #1a2e30 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation -->
<header class="relative z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md pt-12 pb-2">
<div class="flex items-center px-4 justify-between h-14">
<button class="size-10 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-lg font-bold tracking-tight">Play Point</h1>
<p class="text-[10px] uppercase tracking-widest text-primary font-bold">Chorsu Branch</p>
</div>
<button class="size-10 flex items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800">
<span class="material-symbols-outlined text-2xl">info</span>
</button>
</div>
<!-- Zone Selector -->
<div class="flex px-4 mt-4 gap-2 overflow-x-auto no-scrollbar pb-2">
<button class="px-5 py-2 rounded-full bg-primary text-background-dark text-sm font-bold whitespace-nowrap">VIP Lounge</button>
<button class="px-5 py-2 rounded-full bg-slate-200 dark:bg-slate-800 text-sm font-medium whitespace-nowrap opacity-70">Pro Zone</button>
<button class="px-5 py-2 rounded-full bg-slate-200 dark:bg-slate-800 text-sm font-medium whitespace-nowrap opacity-70">Standard</button>
<button class="px-5 py-2 rounded-full bg-slate-200 dark:bg-slate-800 text-sm font-medium whitespace-nowrap opacity-70">Console Arena</button>
</div>
</header>
<!-- Interactive Floor Plan -->
<main class="flex-1 relative overflow-hidden grid-bg">
<div class="absolute inset-0 flex items-center justify-center p-6">
<!-- Floor Plan Simulation -->
<div class="grid grid-cols-4 gap-4 w-full max-w-xs">
<!-- Desk Row 1 -->
<div class="col-span-4 grid grid-cols-4 gap-4 mb-4">
<!-- Seat: Occupied -->
<div class="aspect-square rounded-lg border-2 border-red-500/30 bg-red-500/10 flex items-center justify-center group">
<span class="text-[10px] font-bold text-red-400">01</span>
</div>
<!-- Seat: Available -->
<button class="aspect-square rounded-lg border-2 border-emerald-400 bg-emerald-400/10 flex items-center justify-center neon-glow-primary group transition-all active:scale-95">
<span class="text-[10px] font-bold text-emerald-400">02</span>
</button>
<!-- Seat: Available -->
<button class="aspect-square rounded-lg border-2 border-emerald-400 bg-emerald-400/10 flex items-center justify-center group transition-all active:scale-95">
<span class="text-[10px] font-bold text-emerald-400">03</span>
</button>
<!-- Seat: Occupied -->
<div class="aspect-square rounded-lg border-2 border-red-500/30 bg-red-500/10 flex items-center justify-center">
<span class="text-[10px] font-bold text-red-400">04</span>
</div>
</div>
<!-- Desk Row 2 (Middle Aisle) -->
<div class="col-span-1 space-y-4">
<div class="aspect-square rounded-lg border-2 border-red-500/30 bg-red-500/10 flex items-center justify-center">
<span class="text-[10px] font-bold text-red-400">05</span>
</div>
<button class="aspect-square rounded-lg border-2 border-primary bg-primary/20 flex items-center justify-center neon-glow-primary ring-2 ring-primary ring-offset-4 ring-offset-background-dark">
<span class="text-[10px] font-bold text-primary">06</span>
</button>
</div>
<div class="col-span-2 flex items-center justify-center">
<div class="w-full h-1 bg-white/5 rounded-full"></div>
</div>
<div class="col-span-1 space-y-4">
<button class="aspect-square rounded-lg border-2 border-yellow-400 bg-yellow-400/10 flex items-center justify-center">
<span class="text-[10px] font-bold text-yellow-400">07</span>
</button>
<div class="aspect-square rounded-lg border-2 border-red-500/30 bg-red-500/10 flex items-center justify-center">
<span class="text-[10px] font-bold text-red-400">08</span>
</div>
</div>
<!-- Desk Row 3 -->
<div class="col-span-4 grid grid-cols-4 gap-4 mt-4">
<button class="aspect-square rounded-lg border-2 border-emerald-400 bg-emerald-400/10 flex items-center justify-center transition-all active:scale-95">
<span class="text-[10px] font-bold text-emerald-400">09</span>
</button>
<button class="aspect-square rounded-lg border-2 border-emerald-400 bg-emerald-400/10 flex items-center justify-center transition-all active:scale-95">
<span class="text-[10px] font-bold text-emerald-400">10</span>
</button>
<button class="aspect-square rounded-lg border-2 border-emerald-400 bg-emerald-400/10 flex items-center justify-center transition-all active:scale-95">
<span class="text-[10px] font-bold text-emerald-400">11</span>
</button>
<button class="aspect-square rounded-lg border-2 border-emerald-400 bg-emerald-400/10 flex items-center justify-center transition-all active:scale-95">
<span class="text-[10px] font-bold text-emerald-400">12</span>
</button>
</div>
</div>
</div>
<!-- Floating Legend -->
<div class="absolute top-4 right-4 glass-panel bg-background-dark/40 p-3 rounded-xl flex flex-col gap-2">
<div class="flex items-center gap-2">
<div class="size-2 rounded-full bg-emerald-400"></div>
<span class="text-[10px] font-medium opacity-80 uppercase tracking-tighter">Available</span>
</div>
<div class="flex items-center gap-2">
<div class="size-2 rounded-full bg-red-500"></div>
<span class="text-[10px] font-medium opacity-80 uppercase tracking-tighter">Occupied</span>
</div>
<div class="flex items-center gap-2">
<div class="size-2 rounded-full bg-yellow-400"></div>
<span class="text-[10px] font-medium opacity-80 uppercase tracking-tighter">Reserved</span>
</div>
<div class="flex items-center gap-2">
<div class="size-2 rounded-full bg-primary ring-2 ring-primary/40 ring-offset-1 ring-offset-background-dark"></div>
<span class="text-[10px] font-medium opacity-80 uppercase tracking-tighter">Selected</span>
</div>
</div>
<!-- Specs Popover (Visual hint) -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[85%] glass-panel bg-glass-dark p-4 rounded-2xl border-primary/20 animate-pulse">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="text-xs font-bold text-primary uppercase">Station VIP-06</h3>
<p class="text-[10px] opacity-60">Ultimate Gaming Experience</p>
</div>
<span class="bg-primary/20 text-primary text-[10px] px-2 py-0.5 rounded font-bold">RTX 4090</span>
</div>
<div class="flex gap-4 text-[10px]">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-xs">monitor</span>
<span>240Hz</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-xs">chair</span>
<span>Secretlab</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-xs">keyboard</span>
<span>Mechanical</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="z-30 p-6 pt-2 pb-10 glass-panel bg-background-dark/90 rounded-t-[2rem]">
<div class="flex items-center justify-between mb-6">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest text-slate-400 font-medium">Total Price</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-bold tracking-tighter">45,000</span>
<span class="text-xs font-bold text-primary">UZS / hr</span>
</div>
</div>
<div class="text-right">
<span class="text-[10px] uppercase tracking-widest text-slate-400 font-medium">Session</span>
<p class="text-sm font-bold">2 Hours</p>
</div>
</div>
<button class="w-full bg-secondary-pink hover:bg-secondary-pink/90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all neon-glow-pink">
<span class="uppercase tracking-widest">Book Station Now</span>
<span class="material-symbols-outlined">bolt</span>
</button>
<div class="mt-4 flex items-center justify-center gap-2">
<div class="size-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="text-[10px] text-primary font-bold uppercase tracking-wider">Live occupancy updated</span>
</div>
</footer>
<!-- Tab Bar (iOS style placeholder) -->
<div class="fixed bottom-0 w-full h-8 bg-background-dark pointer-events-none flex justify-center items-center">
<div class="w-32 h-1 bg-white/20 rounded-full mb-1"></div>
</div>
</body></html>
